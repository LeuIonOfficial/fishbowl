services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Append-only file so live game state survives a Redis restart too.
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      args:
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
    restart: unless-stopped
    # Bound to localhost only — reached via the host nginx reverse proxy (TLS).
    ports:
      - '127.0.0.1:8080:3001'
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - CLIENT_DIST=/app/client/dist
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
