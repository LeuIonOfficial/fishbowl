# Self-hosted Umami analytics (privacy-first, cookieless).
# Deployed as its OWN compose project on the VPS (separate from the game stack),
# so game deploys never disturb analytics.
#
#   cd /root/umami && docker compose up -d
#
# Secrets come from /root/umami/.env (UMAMI_DB_PASSWORD, UMAMI_APP_SECRET).
services:
  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U umami -d umami']
      interval: 10s
      timeout: 5s
      retries: 10

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    # Bound to localhost — reached only through the nginx reverse proxy.
    ports:
      - '127.0.0.1:3002:3000'
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/heartbeat >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  umami-db-data:
