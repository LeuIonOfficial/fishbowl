name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          npm --prefix server install
          npm --prefix client install

      - name: Typecheck server
        run: npm --prefix server run typecheck

      - name: Typecheck client
        run: npm --prefix client run typecheck

      - name: Run server tests
        run: npm --prefix server test

      - name: Run client tests
        run: npm --prefix client test

      - name: Build client
        run: npm --prefix client run build

  resilience:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm install
          npm --prefix server install
      - name: Restart-resilience test (Redis-backed)
        env:
          REDIS_URL: redis://localhost:6379
        run: npm --prefix server run test:resilience

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          npm --prefix server install
          npm --prefix client install
          npm --prefix e2e install

      - name: Install Playwright browser
        run: npm --prefix e2e exec playwright install --with-deps chromium

      - name: Run real-browser e2e tests
        run: npm --prefix e2e test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
